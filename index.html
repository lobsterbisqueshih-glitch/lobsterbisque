<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>多服務入口網站</title>
    <style>
        :root {
            --primary: #2d1b3d;
            --secondary: #4a3768;
            --accent: #ff6b6b;
            --text-light: #ffffff;
            --text-dark: #333333;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Microsoft JhengHei', sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #f5f5f5 0%, #e8e8e8 100%);
            color: var(--text-dark);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        header {
            text-align: center;
            padding: 40px 0;
        }
        
        header h1 {
            font-size: 2.5rem;
            color: var(--primary);
            margin-bottom: 10px;
        }
        
        header p {
            font-size: 1.1rem;
            color: #666;
            max-width: 600px;
            margin: 0 auto;
        }
        
        .portal-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            margin: 40px 0;
        }
        
        .portal-card {
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        
        .portal-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.15);
        }
        
        .portal-card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }
        
        .portal-content {
            padding: 25px;
        }
        
        .portal-content h3 {
            font-size: 1.3rem;
            color: var(--primary);
            margin-bottom: 10px;
        }
        
        .portal-content p {
            color: #666;
            line-height: 1.6;
            margin-bottom: 20px;
        }
        
        .portal-link {
            display: inline-block;
            padding: 10px 20px;
            background: var(--primary);
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
            transition: background 0.3s ease;
        }
        
        .portal-link:hover {
            background: var(--secondary);
        }
        
        .ad-section {
            background: white;
            border-radius: 15px;
            padding: 30px;
            margin: 40px 0;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }
        
        .ad-section h2 {
            color: var(--primary);
            margin-bottom: 10px;
            text-align: center;
        }
        
        .ad-section p {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
        }
        
        .ad-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
        }
        
        .ad-card {
            background: #f9f9f9;
            border-radius: 10px;
            overflow: hidden;
            transition: transform 0.3s ease;
        }
        
        .ad-card:hover {
            transform: translateY(-3px);
        }
        
        .ad-card img {
            width: 100%;
            height: 180px;
            object-fit: cover;
        }
        
        .ad-content {
            padding: 20px;
        }
        
        .ad-content h4 {
            color: var(--primary);
            margin-bottom: 8px;
        }
        
        .ad-content p {
            color: #666;
            font-size: 0.9rem;
            margin-bottom: 15px;
        }
        
        .ad-link {
            display: inline-block;
            padding: 8px 16px;
            background: var(--accent);
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-size: 0.9rem;
        }
        
        footer {
            text-align: center;
            padding: 30px;
            color: #666;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>多服務入口網站</h1>
            <p>整合各項命理服務與精選推薦，一站式滿足您的需求</p>
        </header>
        
        <div class="portal-grid">
            <div class="portal-card">
                <img src="https://images.unsplash.com/photo-1513475382585-d06e58bcb0e0?w=400&h=250&fit=crop" alt="天機閣">
                <div class="portal-content">
                    <h3>天機閣</h3>
                    <p>專業命理服務：今日運勢查詢、紫微斗數、八字命理、姓名學分析、靈籤堂抽籤。</p>
                    <a href="destiny/" class="portal-link">前往天機閣</a>
                </div>
            </div>
            
            <div class="portal-card">
                <img src="https://images.unsplash.com/photo-1544716278-ca5e3f4abd8c?w=400&h=250&fit=crop" alt="靈籤堂">
                <div class="portal-content">
                    <h3>靈籤堂（籌備中）</h3>
                    <p>線上抽籤問事系統，提供各類籤詩解讀與運勢指引。</p>
                    <a href="#" class="portal-link">即將上線</a>
                </div>
            </div>
            
            <div class="portal-card">
                <img src="https://images.unsplash.com/photo-1516035069371-29a1b244cc32?w=400&h=250&fit=crop" alt="命名堂">
                <div class="portal-content">
                    <h3>命名堂（籌備中）</h3>
                    <p>專業命名服務，結合八字五行與姓名學，為您挑選吉祥好名。</p>
                    <a href="#" class="portal-link">即將上線</a>
                </div>
            </div>
        </div>
        
        <div class="ad-section">
            <h2>熱門推薦</h2>
            <p>精選商品推薦，提升生活品質</p>
            
            <div class="ad-container" id="portal-ad-container">
                <!-- 廣告由 JavaScript 動態生成 -->
            </div>
        </div>
        
        <footer>
            <p>© 2026 多服務入口網站</p>
        </footer>
    </div>
    
    <script src="ads/ads.js"></script>
    <script>
        // 載入入口網站廣告
        document.addEventListener('DOMContentLoaded', function() {
            if (window.portalAds && window.portalAds.length > 0) {
                const container = document.getElementById('portal-ad-container');
                
                window.portalAds.forEach(ad => {
                    const card = document.createElement('div');
                    card.className = 'ad-card';
                    card.innerHTML = `
                        <img src="${ad.image}" alt="${ad.title}">
                        <div class="ad-content">
                            <h4>${ad.title}</h4>
                            <p>${ad.description}</p>
                            <a href="${ad.link}" target="_blank" class="ad-link">了解更多</a>
                        </div>
                    `;
                    container.appendChild(card);
                });
            } else {
                const container = document.getElementById('portal-ad-container');
                container.innerHTML = '<p style="text-align:center;color:#666;">廣告載入中...</p>';
            }
        });
    </script>
