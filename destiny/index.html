<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>天機閣 - 專業命理服務</title>
    <meta name="description" content="專業命理服務">
    <style>
        body { background: #2d1b3d; color: white; padding: 20px; font-family: sans-serif; }
        .container { max-width: 1200px; margin: 0 auto; }
        .ad-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; margin: 30px 0; }
        .ad-card { background: rgba(255,255,255,0.1); padding: 20px; border-radius: 10px; }
        .ad-card img { width: 100%; height: 200px; object-fit: cover; border-radius: 5px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>天機閣</h1>
        <p>專業命理服務</p>
        
        <div class="ad-container" id="destiny-ad-container">
            <!-- 廣告由 JavaScript 動態生成 -->
        </div>
    </div>
    
    <script src="ads/ads.js"></script>
    <script>
        // 簡單的廣告載入
        document.addEventListener('DOMContentLoaded', function() {
            if (window.destinyAds && window.destinyAds.length > 0) {
                const container = document.getElementById('destiny-ad-container');
                window.destinyAds.forEach(ad => {
                    const card = document.createElement('div');
                    card.className = 'ad-card';
                    card.innerHTML = `
                        <img src="${ad.image}" alt="${ad.title}">
                        <h3>${ad.title}</h3>
                        <p>${ad.description}</p>
                        <a href="${ad.link}" target="_blank">了解更多</a>
                    `;
                    container.appendChild(card);
                });
            }
        });
    </script>
</body>
</html>
